<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form (html only)</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <main>
        <h1>Job Application Form</h1>
        <form>
            <p><strong>Fields marked with * are required.</strong></p>

            <label> Position Applied for *</label><br/>
            <input type="text" required /> <br/><br/>

            <label> First Name *</label> <br/><br/>
            <input type="text" required /> <br/><br/>

            <label> Last Name *</label> <br/><br/>
            <input type="text" required /> <br/><br/>

            <label> Email *</label> <br/><br/>
            <input type="email" required /> <br/><br/>

            <label> Phone *</label> <br/><br/>
            <input type="tel" required /> <br/><br/>

            <label> Current City *</label> <br/><br/>
            <input type="text" required /> <br/><br/>

            <label> Highest Education *</label> <br/><br/>
            <input type="text" required /> <br/><br/>

            <label> Year of Experience  *</label> <br/><br/>
            <input type="number" required /> <br/><br/>

            <label> Upload Resume (PDF) *</label> <br/><br/>
            <input type="file" accept="Application/PDF" required /> <br/><br/>

            <label> Signature (Full Name) *</label> <br/><br/>
            <input type="text" required /> <br/><br/>

            <button type="submit"> submit Application</button>
            <button type="reset"> Clear Form</button>
        </form>
    </main>
</body>
</html>
